<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SpeakAI — AI Interview Coach & Communication Practice</title>

    <meta
      name="description"
      content="Practice mock interviews with AI. Improve communication, technical interview skills, confidence, speaking clarity, and interview performance using SpeakAI."
    />

    <meta
      name="keywords"
      content="AI interview coach, mock interview AI, React interview questions, JavaScript interview prep, frontend interview practice, AI communication coach"
    />

    <meta name="author" content="SpeakAI" />

    <!-- Open Graph -->
    <meta property="og:title" content="SpeakAI — AI Interview Coach" />

    <meta
      property="og:description"
      content="Practice interviews with AI and improve communication skills."
    />

    <meta property="og:image" content="https://speakai.in/og-image.png" />

    <meta property="og:url" content="https://speakai.in" />

    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="SpeakAI — AI Interview Coach" />

    <meta
      name="twitter:description"
      content="Practice interviews with AI and improve communication skills."
    />

    <meta name="twitter:image" content="https://speakai.in/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" href="/logo.svg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://speakai.in" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "SpeakAI",
        "url": "https://speakai.in",
        "logo": "https://speakai.in/logo.svg"
      }
    </script>

    <!-- Sitemap & Robots -->
    <link
      rel="sitemap"
      type="application/xml"
      href="https://speakai.in/sitemap.xml"
    />
    <meta name="robots" content="index, follow" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Netlify hidden forms (keep as-is) -->
    <form name="lead-magnet" data-netlify="true" netlify hidden>
      <input type="email" name="email" />
    </form>
    <form name="contact" data-netlify="true" netlify hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
  </head>
  <body class="bg-background text-text">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
